name: Publish to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_type:
        description: Modrinth version type
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Markdown changelog for Modrinth
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_VERSION_TYPE: ${{ inputs.version_type || 'release' }}
          MODRINTH_CHANGELOG: ${{ github.event.release.body || inputs.changelog || 'See the GitHub release notes for changes.' }}
        run: |
          ./gradlew build modrinth \
            -PmodrinthVersionType="${MODRINTH_VERSION_TYPE}"
