name: Publish to Modrinth

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      changelog:
        description: Markdown changelog for Modrinth
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_CHANGELOG: ${{ inputs.changelog || github.event.head_commit.message || 'Published from main.' }}
        run: |
          ./gradlew build modrinth
